services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: petmarket
      POSTGRES_USER: petmarket
      POSTGRES_PASSWORD: petmarket_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U petmarket']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5433:5432'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: petmarket
      DB_PASSWORD: petmarket_secret
      DB_NAME: petmarket
      JWT_SECRET: petmarket_jwt_secret_change_in_prod
      FIELD_ENCRYPTION_KEY: petmarket_enc_key_32chars_padding
      BCRYPT_ROUNDS: 10
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
